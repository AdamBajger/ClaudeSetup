apiVersion: v1
kind: Service
metadata:
  name: {{ include "claude-cli.fullname" . }}-ssh
  labels:
    {{- include "claude-cli.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "claude-cli.selectorLabels" . | nindent 4 }}
  ports:
    - name: ssh
      port: {{ .Values.service.port }}
      targetPort: ssh
      protocol: TCP
