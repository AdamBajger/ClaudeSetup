apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "claude-cli.fullname" . }}
  labels:
    {{- include "claude-cli.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate          # PVC RWO — rolling deadlocks on attach.
  selector:
    matchLabels:
      {{- include "claude-cli.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "claude-cli.selectorLabels" . | nindent 8 }}
    spec:
      {{- $gpuNS := include "claude-cli.gpu.nodeSelector" . | trim }}
      {{- if $gpuNS }}
      nodeSelector:
        {{- $gpuNS | nindent 8 }}
      {{- end }}
      # PodSecurity "restricted" profile compliance.
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        # Skip the recursive fsGroup chown of the whole PVC on every start —
        # on NFS with tens of thousands of files it stalls pod init for minutes.
        # OnRootMismatch only re-chowns when the volume root's owner/perms differ.
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        {{- if .Values.public.web.enabled }}
        # Let the rootless caddy bind :80/:443. This is a "safe" sysctl (per-pod
        # net namespace, k8s 1.22+) so it's allowed under PodSecurity
        # "restricted" — unlike file-caps/NET_BIND_SERVICE, which no_new_privs
        # (allowPrivilegeEscalation:false) would silently ignore on exec.
        sysctls:
          - name: net.ipv4.ip_unprivileged_port_start
            value: "0"
        {{- end }}
      initContainers:
        - name: init-data
          image: busybox:1.36
          command: [sh, -c]
          args:
            - |
              set -e
              mkdir -p /data/claude /data/ssh /data/ssh/host-keys /data/gh /data/workspaces
              chmod 700 /data/ssh /data/ssh/host-keys
              find /data/ssh/host-keys -type f -exec chmod 600 {} \;
              find /data/ssh/host-keys -type f -name "*.pub" -exec chmod 644 {} \;
              if [ -d /data/claude.json ]; then rmdir /data/claude.json || true; fi
              # .claude.json now lives INSIDE the .claude dir (CLAUDE_CONFIG_DIR,
              # issue #4) so atomic saves work. Migrate the old top-level copy
              # (/data/claude.json) once, then seed onboarding flags if missing so
              # the TUI doesn't relaunch the login wizard.
              if [ -f /data/claude.json ] && [ ! -e /data/claude/.claude.json ]; then
                cp /data/claude.json /data/claude/.claude.json
              fi
              if [ ! -s /data/claude/.claude.json ] || [ "$(cat /data/claude/.claude.json)" = '{}' ]; then
                printf '{"hasCompletedOnboarding":true,"lastOnboardingVersion":"2.1.119"}\n' > /data/claude/.claude.json
              fi
              [ -e /data/.bash_history ] || touch /data/.bash_history
              # Bootstrap credentials.json from the Secret on first start, OR
              # whenever the Secret's value changes (tracked via a hash marker).
              # The CLI rotates the token in place afterwards; we hash the *seed*
              # (not the live file), so rotated tokens are preserved across
              # restarts and we only re-seed when values.yaml creds change.
              if [ -s /bootstrap/credentials.json ]; then
                newhash=$(md5sum /bootstrap/credentials.json | cut -d' ' -f1)
                oldhash=$(cat /data/claude/.cred-bootstrap-hash 2>/dev/null || true)
                if [ ! -e /data/claude/.credentials.json ] || [ "$newhash" != "$oldhash" ]; then
                  cp /bootstrap/credentials.json /data/claude/.credentials.json
                  chmod 600 /data/claude/.credentials.json
                  printf '%s\n' "$newhash" > /data/claude/.cred-bootstrap-hash
                fi
              fi
              # AGENTS.md + skills are seeded from the image by the entrypoint
              # (single source for docker compose and k8s) — not here.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - { name: data, mountPath: /data }
            - { name: bootstrap, mountPath: /bootstrap, readOnly: true }
      containers:
        - name: claude
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - { name: ssh, containerPort: 2222, protocol: TCP }
            {{- if .Values.public.web.enabled }}
            - { name: http,  containerPort: 80,  protocol: TCP }
            - { name: https, containerPort: 443, protocol: TCP }
            {{- end }}
          env:
            - name: AUTHORIZED_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ include "claude-cli.secretName" . }}
                  key: AUTHORIZED_KEYS
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "claude-cli.secretName" . }}
                  key: GH_TOKEN
                  optional: true
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "claude-cli.secretName" . }}
                  key: HF_TOKEN
                  optional: true
            {{- if .Values.claude.autoStartTmux.enabled }}
            - name: CLAUDE_AUTOSTART_TMUX_SESSION_NAME
              value: {{ .Values.claude.autoStartTmux.tmuxSessionName | quote }}
            - name: CLAUDE_AUTOSTART_CLAUDE_COMMAND
              value: {{ .Values.claude.autoStartTmux.claudeCommand | quote }}
            {{- end }}
            {{- if .Values.public.web.enabled }}
            - name: CLAUDE_WEB_ENABLED
              value: "true"
            {{- with .Values.public.host }}
            # caddy needs the public host to obtain + serve its TLS cert.
            - name: CLAUDE_WEB_HOST
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.public.web.email }}
            - name: CLAUDE_ACME_EMAIL
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.public.web.staging }}
            # LE staging: untrusted certs, but no rate limit while testing.
            - name: CLAUDE_ACME_CA
              value: "https://acme-staging-v02.api.letsencrypt.org/directory"
            {{- end }}
            {{- end }}
            {{- with .Values.youtrack.host }}
            - name: YT_HOST
              value: {{ . | quote }}
            - name: YT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "claude-cli.secretName" $ }}
                  key: YT_TOKEN
                  optional: true
            {{- end }}
          volumeMounts:
            # No ~/.claude.json FILE mount (issue #4): it lives inside the
            # ~/.claude DIRECTORY mount below (CLAUDE_CONFIG_DIR) so atomic
            # saves work. A file subPath mount can't be replaced by rename().
            - { name: data, mountPath: /home/claude/.claude,      subPath: claude }
            - { name: data, mountPath: /home/claude/.ssh,         subPath: ssh }
            - { name: data, mountPath: /home/claude/.config/gh,   subPath: gh }
            - { name: data, mountPath: /home/claude/workspaces,   subPath: workspaces }
            - { name: data, mountPath: /home/claude/.bash_history, subPath: .bash_history }
            {{- if .Values.shmSize }}
            - { name: dshm, mountPath: /dev/shm }
            {{- end }}
          resources:
            {{- $res := deepCopy .Values.resources }}
            {{- $gpuLim := include "claude-cli.gpu.limits" . | trim }}
            {{- if $gpuLim }}
            {{- $_ := set $res "limits" (mergeOverwrite (dict) ($res.limits | default dict) (fromYaml $gpuLim)) }}
            {{- end }}
            {{- toYaml $res | nindent 12 }}
          readinessProbe:
            tcpSocket: { port: ssh }
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 15
          livenessProbe:
            tcpSocket: { port: ssh }
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "claude-cli.fullname" . }}-data
        {{- if .Values.shmSize }}
        # Memory-backed /dev/shm (default is 64Mi). Counts against the pod's
        # memory limit; sizeLimit caps the tmpfs so it can't exceed it.
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.shmSize | quote }}
        {{- end }}
        - name: bootstrap
          secret:
            secretName: {{ include "claude-cli.secretName" . }}
            items:
              - key: credentials.json
                path: credentials.json
                mode: 0400
            optional: true   # Secret may exist without credentialsJson set
