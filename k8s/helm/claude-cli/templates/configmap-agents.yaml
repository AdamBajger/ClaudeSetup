{{- $agents := .Files.Get "files/AGENTS.md" }}
{{- if $agents }}
# Manager-orchestrator AGENTS.md, seeded into ~/workspaces by the init
# container. Source of truth is files/AGENTS.md in the chart; edit there.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "claude-cli.fullname" . }}-agents
  labels:
    {{- include "claude-cli.labels" . | nindent 4 }}
data:
  AGENTS.md: |-
{{ $agents | indent 4 }}
{{- end }}
