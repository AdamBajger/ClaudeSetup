{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "claude-cli.fullname" . }}
  labels:
    {{- include "claude-cli.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUTHORIZED_KEYS: |-
{{ .Values.auth.authorizedKeys | trim | indent 4 }}
  # Always emit credentials.json (possibly empty) so the projected volume
  # mount in the deployment never fails on missing key. Init container only
  # copies non-empty content onto the PVC.
  credentials.json: |-
{{ .Values.auth.credentialsJson | trim | indent 4 }}
  {{- with .Values.auth.ghToken }}
  GH_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.auth.hfToken }}
  HF_TOKEN: {{ . | quote }}
  {{- end }}
{{- end }}
