apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "claude-cli.fullname" . }}-data
  labels:
    {{- include "claude-cli.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- with .Values.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
  {{- with .Values.persistence.volumeName }}
  # Bind to a specific pre-existing PV (e.g. reuse a Retained volume from a
  # prior release). The PV's claimRef must be cleared first so it's Available.
  volumeName: {{ . | quote }}
  {{- end }}
