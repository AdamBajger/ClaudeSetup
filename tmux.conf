set -g mouse on
set -g allow-passthrough on
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g history-limit 50000
# Keep a pane open ONLY when its command crashed (non-zero exit) so a failed
# autostart stays inspectable — a clean `/exit` (exit 0) closes the pane normally.
set -g remain-on-exit failed
